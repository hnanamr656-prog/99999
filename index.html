<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>❤️ Love Page</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
  overflow: hidden;
}

h1 {
  margin-top: 20%;
  font-size: 40px;
  color: #ff4d6d;
}

button {
  padding: 10px 20px;
  font-size: 18px;
  border: none;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  border-radius: 10px;
}

.heart {
  position: absolute;
  color: red;
  animation: fall 5s linear infinite;
}

@keyframes fall {
  0% {transform: translateY(-10%); opacity: 1;}
  100% {transform: translateY(110vh); opacity: 0;}
}
</style>
</head>

<body>

<h1>أنا بحبك ❤️</h1>

<button onclick="showLove()">اضغط هنا</button>

<script>
function showLove(){
  alert("بحبك جدًا ❤️");

  for(let i=0;i<30;i++){
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.className = "heart";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = Math.random()*30 + 10 + "px";
    document.body.appendChild(heart);
  }
}
</script>

</body>
</html>
