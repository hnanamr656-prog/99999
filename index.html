<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Miro Studio Karaoke</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-size: 40px;
  margin-top: 20%;
  font-family: Arial;
}

button {
  font-size: 20px;
  padding: 10px;
}
</style>
</head>

<body>

<div id="text">اضغطي تشغيل 🎤</div>
<br>
<button onclick="start()">▶ تشغيل</button>

<script>
let text = "في يوم هنعود ده بينا وعود وفي غيابه أكيد لسه الأمل موجود";
let i = 0;

function start(){
  window.open("https://www.youtube.com/watch?v=FirJe3W2Lf8");

  let interval = setInterval(() => {
    document.getElementById("text").innerHTML = text.slice(0, i);
    i++;

    if(i > text.length){
      clearInterval(interval);
    }
  }, 120);
}
</script>

</body>
</html>
