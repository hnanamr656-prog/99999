<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a, #2b0a1a);
  overflow: hidden;
  font-family: Arial;
}

.card {
  text-align: center;
  color: white;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 30px rgba(255, 0, 100, 0.4);
  backdrop-filter: blur(10px);
}

h1 {
  color: #ff4d6d;
  font-size: 40px;
}

p {
  font-size: 20px;
  margin-top: 10px;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  background: #ff4d6d;
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

.heart {
  position: absolute;
  color: #ff4d6d;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh) scale(0.5); opacity: 1;}
  100% {transform: translateY(-10vh) scale(1.2); opacity: 0;}
}

.pulse {
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.2);}
  100% {transform: scale(1);}
}
</style>
</head>

<body>

<div class="card">
  <h1 class="pulse">أنا بحبك ❤️</h1>
  <p>دي رسالة صغيرة بس من قلبي ليكي 💌</p>
  <button onclick="love()">اضغطي هنا 🎁</button>
</div>

<script>
function love(){
  alert("أنا بحبك جدًا ❤️✨");

  for(let i=0;i<40;i++){
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.className = "heart";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*25 + 10) + "px";
    heart.style.animationDuration = (Math.random()*3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }
}
</script>

</body>
</html>
