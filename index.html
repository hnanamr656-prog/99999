<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>❤️ Message For You</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a, #2b0a1a);
  font-family: Arial;
  overflow: hidden;
}

.card {
  text-align: center;
  color: white;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 30px rgba(255, 0, 100, 0.4);
  backdrop-filter: blur(10px);
  width: 80%;
  max-width: 500px;
}

h1 {
  color: #ff4d6d;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  background: #ff4d6d;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}

.hidden {
  display: none;
}

.heart {
  position: absolute;
  color: #ff4d6d;
  font-size: 20px;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh); opacity: 1;}
  100% {transform: translateY(-10vh); opacity: 0;}
}
</style>
</head>

<body>

<div class="card">
  
  <div id="intro">
    <h1>💌 رسالة صغيرة مني ليكي</h1>
    <p>في حاجة مهمة عايز أقولها ❤️</p>
    <button onclick="showMessage()">اضغط هنا</button>
  </div>

  <div id="msg" class="hidden">
    <h1>❤️ أنا بحبك اووووي بجد</h1>
    <p>وربنا يخليكي ليا ويديمك في حياتي يا روحي ♥️♥️</p>
  </div>

</div>

<script>
function showMessage(){
  document.getElementById("intro").style.display = "none";
  document.getElementById("msg").classList.remove("hidden");

  for(let i=0;i<50;i++){
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.className = "heart";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*25 + 10) + "px";
    heart.style.animationDuration = (Math.random()*3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }
}
</script>

</body>
</html>
